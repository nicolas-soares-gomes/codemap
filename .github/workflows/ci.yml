name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add components
        run: rustup component add rustfmt clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked

  musl-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add musl target + toolchain
        run: |
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build static binary
        run: cargo build --release --locked --target x86_64-unknown-linux-musl -p codemap
      - name: Smoke test
        run: ./target/x86_64-unknown-linux-musl/release/codemap --version

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t codemap:ci .
      - name: Run
        run: docker run --rm codemap:ci --version
