# Linkagem estática para os targets musl (usado no build Docker).
# Só afeta builds com --target <musl>; o build nativo de dev fica inalterado.
[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static"]
